name: Update Registry Index

on:
  push:
    branches:
      - main
    paths:
      - "registry/capabilities/**"

permissions:
  contents: write

jobs:
  update-index:
    name: Regenerate registry/index.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit pushed back can trigger other workflows
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate index.json
        run: node scripts/update-index.js

      - name: Check for index changes
        id: diff
        run: |
          if git diff --quiet registry/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated index.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/index.json
          git commit -m "chore: regenerate registry/index.json [skip ci]"
          git push

      - name: No index changes needed
        if: steps.diff.outputs.changed == 'false'
        run: echo "registry/index.json is already up to date."
